# Render Blueprint — deploys the Python (FastAPI) admission voice assistant.
# Render injects RENDER_EXTERNAL_URL automatically, so no ngrok / PUBLIC_URL needed.
services:
  - type: web
    name: rku-voice-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: STT_ENGINE
        value: sarvam
      - key: DEFAULT_LANGUAGE
        value: gu
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: SARVAM_TTS_MODEL
        value: bulbul:v2
      - key: SARVAM_TTS_SPEAKER
        value: anushka
      - key: ADMIN_USER
        value: admin
      # ── Secrets — set these in the Render dashboard (sync:false = not in git) ──
      - key: SARVAM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
